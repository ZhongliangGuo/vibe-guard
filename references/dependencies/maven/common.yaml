# Maven — Common Package Advisories

- package: org.apache.logging.log4j:log4j-core
  affected: ">=2.0,<2.17.1"
  severity: 🔴 critical
  cve: CVE-2021-44228 (Log4Shell)
  description: "RCE via JNDI lookup in log messages. One of the most severe vulnerabilities in history."
  fix: Upgrade to log4j-core>=2.17.1. Set log4j2.formatMsgNoLookups=true as interim mitigation.

- package: org.apache.logging.log4j:log4j-core
  affected: ">=2.0,<2.17.0"
  severity: 🟠 high
  cve: CVE-2021-45105
  description: DoS via recursive lookup in Thread Context Map
  fix: Upgrade to log4j-core>=2.17.0

- package: com.fasterxml.jackson.databind:jackson-databind
  affected: "<2.14.0"
  severity: 🟠 high
  cve: Multiple
  description: Multiple deserialization gadget RCE vectors via polymorphic type handling
  fix: Upgrade to jackson-databind>=2.14.0, disable default typing

